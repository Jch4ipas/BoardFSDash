- name: Créer un fichier dashboard.service
  copy:
    dest: /etc/systemd/system/dashboard.service
    content: |
      [Unit]
      Description=Démarrer le dashboard Docker
      After=network.target docker.service

      [Service]
      User=pi
      WorkingDirectory=/home/pi
      ExecStart=/home/pi/docker-compose.sh
      Restart=always

      [Install]
      WantedBy=multi-user.target
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true

- name: Enable dashboard autostart systemctl
  command: sudo systemctl enable dashboard
  become: true