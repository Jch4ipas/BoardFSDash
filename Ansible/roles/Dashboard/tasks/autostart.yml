- name: Créer un fichier docker-compose.sh
  copy:
    dest: /home/{{ ansible_user }}/docker-compose.sh
    content: |
      #!/bin/bash
      sudo docker-compose -f /opt/docker-compose.yml up -d
    mode: '0755'


