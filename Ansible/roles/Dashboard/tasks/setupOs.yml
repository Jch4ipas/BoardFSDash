- name: stop default webserver
  command: sudo systemctl stop lighttpd
  become: true

- name: Disable default webserver
  command: sudo systemctl disable lighttpd
  become: true

- name: Set system locale
  become: true
  lineinfile:
    path: /etc/default/locale
    regexp: '^LANG='
    line: 'LANG=fr_CH.UTF-8'


- name: Change web page
  copy:
    dest: /boot/firmware/fullpageos.txt
    content: |
      https://dash.fsd.epfl.ch
  become: true